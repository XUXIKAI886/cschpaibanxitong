<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呈尚策划 · 运营部智能排班表</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:           #ece8ff;
    --bg-grad-1:    #efeaff;
    --bg-grad-2:    #e6e3ff;
    --card:         #ffffff;
    --soft:         #f4f1ff;
    --soft-2:       #ede8ff;
    --border:       #e6e1f5;
    --border-strong:#d9d2f0;

    --primary:      #7c5cff;
    --primary-2:    #6a47ff;
    --primary-deep: #4a32c9;
    --primary-soft: #f1ecff;

    --pink:         #ff5b8a;
    --pink-2:       #ff3f78;
    --blue:         #4aa6ff;
    --blue-2:       #2e90ff;
    --orange:       #ff9a4d;
    --orange-2:     #ff7e2e;

    --ink:          #1f1b3a;
    --ink-2:        #3a345e;
    --muted:        #7a78a3;
    --muted-2:      #9c9ab8;

    --shadow-sm:    0 2px 8px rgba(80, 60, 180, 0.06);
    --shadow-md:    0 8px 24px rgba(80, 60, 180, 0.10);
    --shadow-lg:    0 16px 40px rgba(80, 60, 180, 0.16);
    --shadow-btn:   0 6px 16px rgba(124, 92, 255, 0.30);

    --r-sm:  8px;
    --r-md:  12px;
    --r-lg:  16px;
    --r-xl:  22px;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: radial-gradient(1200px 800px at 10% -10%, #f3eeff 0%, transparent 60%),
                radial-gradient(1000px 700px at 110% 110%, #e6e0ff 0%, transparent 55%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
    min-height: 100vh;
    color: var(--ink);
    padding: 28px 22px 40px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1480px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    padding: 28px 32px 32px;
    position: relative;
  }

  /* ─────────── HEADER ─────────── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 22px;
    position: relative;
  }

  .header-left { display: flex; flex-direction: column; gap: 10px; }

  .title {
    display: flex; align-items: center; gap: 12px;
    font-size: 30px; font-weight: 800;
    color: var(--ink);
    letter-spacing: 0.5px;
  }
  .title .sparkle {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #8a6bff, #6a47ff);
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 17px;
    box-shadow: 0 6px 14px rgba(106,71,255,.35);
  }
  .title .accent {
    color: var(--primary);
    font-size: 22px;
    margin-left: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14.5px;
    font-weight: 500;
    padding-left: 48px;
    position: relative;
  }
  .subtitle::after {
    content: '✨';
    margin-left: 6px;
    font-size: 14px;
  }
  .subtitle .underline {
    position: relative;
    display: inline-block;
  }
  .subtitle .underline::after {
    content: '';
    position: absolute;
    left: -2px; right: -2px; bottom: -3px;
    height: 6px;
    background: linear-gradient(90deg, #ff7ab0, #ffc26b);
    border-radius: 4px;
    opacity: .55;
    z-index: -1;
  }

  /* Decorative illustration on right */
  .hero-illu {
    position: relative;
    width: 260px; height: 110px;
    margin-right: 130px;
    flex-shrink: 0;
  }
  .hero-illu svg { width: 100%; height: 100%; overflow: visible; }

  .home-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-2);
    box-shadow: var(--shadow-sm);
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: all .2s ease;
    align-self: flex-start;
  }
  .home-btn i { color: var(--primary); }
  .home-btn:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }

  /* ─────────── FEATURE CARDS ─────────── */
  .features {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 6px;
  }
  .feat {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    min-height: 64px;
  }
  .feat .ic {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #ece4ff, #ddd1ff);
    color: var(--primary-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .feat .txt {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink-2);
    font-weight: 500;
  }
  .feat-note {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 10px;
    margin-bottom: 18px;
  }
  .feat-note i { color: var(--primary); }

  /* ─────────── TWO COLUMN: DRAG + AUTO ─────────── */
  .two-col {
    display: grid;
    grid-template-columns: minmax(340px, 1fr) minmax(640px, 2fr);
    gap: 14px;
    margin-bottom: 14px;
  }

  .panel {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px 18px;
  }
  .panel-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .panel-title .pt-ic {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: linear-gradient(135deg, #ede4ff, #d8c9ff);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--primary-2);
    font-size: 13px;
  }

  /* drag buttons */
  .drag-row { display: flex; gap: 14px; align-items: center; }
  .drag-tag {
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    cursor: grab;
    user-select: none;
    border: none;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    transition: transform .15s ease, box-shadow .2s ease;
  }
  .drag-tag.work {
    background: linear-gradient(135deg, #8a6bff 0%, #6a47ff 100%);
    box-shadow: 0 8px 18px rgba(106,71,255,.32);
  }
  .drag-tag.rest {
    background: linear-gradient(135deg, #ff7ba6 0%, #ff3f78 100%);
    box-shadow: 0 8px 18px rgba(255,90,138,.32);
  }
  .drag-tag:hover { transform: translateY(-2px); }
  .drag-tag:active { cursor: grabbing; transform: scale(.97); }

  /* day pills + generate */
  .auto-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .day-pill {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 9px 16px;
    border-radius: 10px;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--ink-2);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    user-select: none;
  }
  .day-pill input { display: none; }
  .day-pill:hover { border-color: var(--primary); color: var(--primary); }
  .day-pill.selected {
    background: linear-gradient(135deg, #8a6bff, #6a47ff);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 14px rgba(106,71,255,.28);
  }
  .gen-btn {
    margin-left: auto;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 22px;
    border-radius: 11px;
    border: none;
    background: linear-gradient(135deg, #8a6bff 0%, #6a47ff 100%);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow-btn);
    transition: transform .15s ease, box-shadow .2s ease;
    white-space: nowrap;
  }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(124,92,255,.36); }
  .gen-btn:disabled { opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }

  /* ─────────── GROUP CARDS ─────────── */
  .group-row {
    display: grid;
    grid-template-columns: minmax(340px, 1fr) minmax(640px, 2fr);
    gap: 14px;
    margin-bottom: 18px;
  }
  .group {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 18px;
  }
  .group .gh {
    display: flex; align-items: center; gap: 8px;
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .group .gh .gic {
    width: 24px; height: 24px;
    border-radius: 7px;
    background: linear-gradient(135deg, #ede4ff, #d8c9ff);
    color: var(--primary-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .group .members {
    font-size: 13.5px;
    color: var(--ink-2);
    padding-left: 32px;
  }
  .group .rules {
    font-size: 13px;
    color: var(--muted);
    padding-left: 32px;
    line-height: 1.7;
  }
  .group .rules b { color: var(--ink-2); font-weight: 600; }
  .group .rules .sep { color: var(--border-strong); margin: 0 10px; }

  /* ─────────── TABLE ─────────── */
  .table-wrap {
    border-radius: var(--r-md);
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
    box-shadow: 0 4px 14px rgba(80,60,180,.05);
    margin-bottom: 24px;
  }
  table.sched {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  table.sched thead th {
    background: linear-gradient(135deg, #8a6bff 0%, #6a47ff 100%);
    color: #fff;
    font-weight: 700;
    font-size: 14.5px;
    padding: 16px 8px;
    text-align: center;
    letter-spacing: 0.5px;
    border-right: 1px solid rgba(255,255,255,.18);
  }
  table.sched thead th:last-child { border-right: none; }
  table.sched thead th:first-child { width: 170px; }

  table.sched tbody td {
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0;
    height: 64px;
    text-align: center;
    background: #fff;
    transition: background .2s ease;
  }
  table.sched tbody td:last-child { border-right: none; }

  .emp-cell {
    display: flex; align-items: center; gap: 12px;
    padding: 0 18px;
    height: 100%;
    text-align: left;
  }
  .emp-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
    background: #f4f1ff;
    box-shadow: 0 2px 6px rgba(80,60,180,.10);
    border: 2px solid #fff;
    display: inline-block;
  }

  .schedule-cell {
    height: 100%;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted-2);
    font-size: 13.5px;
    cursor: pointer;
    transition: all .2s ease;
    padding: 6px;
    user-select: none;
  }
  .schedule-cell.handover-assigned { flex-direction: column; gap: 3px; }
  .schedule-cell .schedule-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 700; font-size: 14px;
  }
  .schedule-cell .handover-text {
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255,255,255,.92);
    line-height: 1.25;
  }
  .schedule-cell.work-assigned {
    background: linear-gradient(135deg, #8a6bff, #6a47ff);
    color: #fff;
  }
  .schedule-cell.rest-assigned {
    background: linear-gradient(135deg, #ff7ba6, #ff3f78);
    color: #fff;
  }
  .schedule-cell:hover { background-color: var(--soft-2); }
  .schedule-cell.work-assigned:hover { filter: brightness(1.05); }
  .schedule-cell.rest-assigned:hover { filter: brightness(1.05); }
  .schedule-cell.drag-over {
    background: var(--primary-soft);
    outline: 2px dashed var(--primary);
    outline-offset: -4px;
  }

  /* ─────────── BOTTOM ACTIONS ─────────── */
  .actions {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 16px;
  }
  .act {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 13px 28px;
    border-radius: 12px;
    border: none;
    color: #fff;
    font-weight: 700;
    font-size: 14.5px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,.08);
    transition: transform .15s ease, box-shadow .2s ease;
    min-width: 160px;
    justify-content: center;
  }
  .act:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,.12); }
  .act.clear  { background: linear-gradient(135deg, #ff7ba6, #ff3f78); }
  .act.export { background: linear-gradient(135deg, #8a6bff, #6a47ff); }
  .act.save   { background: linear-gradient(135deg, #5fb6ff, #2e90ff); }
  .act.shot   { background: linear-gradient(135deg, #ffb069, #ff7e2e); }

  /* ─────────── CONTEXT MENU ─────────── */
  .context-menu {
    position: fixed;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    z-index: 9999;
    min-width: 160px;
    display: none;
    overflow: hidden;
    padding: 6px;
  }
  .context-menu-item {
    padding: 9px 12px;
    cursor: pointer;
    border-radius: 8px;
    display: flex; align-items: center; gap: 9px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-2);
  }
  .context-menu-item:hover { background: var(--soft); }
  .context-menu-item.work   { color: var(--primary-2); }
  .context-menu-item.rest   { color: var(--pink-2); }
  .context-menu-item.delete { color: #e0405e; }
  .context-menu-item i { width: 14px; text-align: center; }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1f1b3a;
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: all .3s ease;
    z-index: 99999;
    box-shadow: 0 12px 30px rgba(0,0,0,.25);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 1100px) {
    .features { grid-template-columns: repeat(2, 1fr); }
    .two-col, .group-row { grid-template-columns: 1fr; }
    .hero-illu { display: none; }
  }
  @media (max-width: 720px) {
    .container { padding: 18px; }
    .title { font-size: 22px; }
    .subtitle { padding-left: 0; font-size: 13px; }
    .features { grid-template-columns: 1fr; }
    table.sched thead th:first-child { width: 110px; }
    .emp-cell { padding: 0 8px; gap: 8px; }
    .emp-name { font-size: 13px; }
    .avatar { width: 30px; height: 30px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="container" id="captureRoot">

  <!-- ─────────── HEADER ─────────── -->
  <div class="header">
    <div class="header-left">
      <div class="title">
        <span class="sparkle"><i class="fas fa-bolt"></i></span>
        呈尚策划 · 运营部智能排班表
        <span class="accent">✨</span>
      </div>
      <div class="subtitle">
        <span class="underline">一键排班，高效协作，让团队运转更轻松</span>
      </div>
    </div>

    <!-- decorative illustration -->
    <div class="hero-illu" aria-hidden="true">
      <svg viewBox="0 0 260 110" xmlns="http://www.w3.org/2000/svg">
        <!-- floating dots -->
        <circle cx="20" cy="30" r="9" fill="#ffd2e3"/>
        <circle cx="70" cy="14" r="5" fill="#c9bdff"/>
        <circle cx="118" cy="46" r="3.5" fill="#ffc9a3"/>
        <polygon points="240,12 244,22 254,22 246,28 250,38 240,32 230,38 234,28 226,22 236,22" fill="#ffd76b"/>
        <polygon points="180,0 183,7 190,7 184,11 186,18 180,14 174,18 176,11 170,7 177,7" fill="#ffd76b" opacity=".85"/>
        <!-- calendar -->
        <g transform="translate(110, 12)">
          <rect x="0" y="10" width="92" height="78" rx="10" fill="#fff" stroke="#cabcff" stroke-width="2"/>
          <rect x="0" y="10" width="92" height="22" rx="10" fill="#8a6bff"/>
          <rect x="0" y="26" width="92" height="6" fill="#8a6bff"/>
          <circle cx="18" cy="10" r="4" fill="#7050ff" stroke="#5a3fd6" stroke-width="2"/>
          <circle cx="74" cy="10" r="4" fill="#7050ff" stroke="#5a3fd6" stroke-width="2"/>
          <!-- grid dots -->
          <g fill="#cabcff">
            <rect x="10" y="42" width="12" height="9" rx="2"/>
            <rect x="26" y="42" width="12" height="9" rx="2"/>
            <rect x="42" y="42" width="12" height="9" rx="2" fill="#ff8db0"/>
            <rect x="58" y="42" width="12" height="9" rx="2"/>
            <rect x="74" y="42" width="12" height="9" rx="2"/>
            <rect x="10" y="56" width="12" height="9" rx="2"/>
            <rect x="26" y="56" width="12" height="9" rx="2" fill="#ffc26b"/>
            <rect x="42" y="56" width="12" height="9" rx="2"/>
            <rect x="58" y="56" width="12" height="9" rx="2"/>
            <rect x="74" y="56" width="12" height="9" rx="2"/>
            <rect x="10" y="70" width="12" height="9" rx="2"/>
            <rect x="26" y="70" width="12" height="9" rx="2"/>
            <rect x="42" y="70" width="12" height="9" rx="2"/>
            <rect x="58" y="70" width="12" height="9" rx="2" fill="#9bd0ff"/>
            <rect x="74" y="70" width="12" height="9" rx="2"/>
          </g>
        </g>
        <!-- clock -->
        <g transform="translate(200, 38)">
          <circle cx="22" cy="22" r="22" fill="#fff" stroke="#8a6bff" stroke-width="2.5"/>
          <circle cx="22" cy="22" r="2.5" fill="#6a47ff"/>
          <line x1="22" y1="22" x2="22" y2="9" stroke="#6a47ff" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="22" y1="22" x2="32" y2="22" stroke="#6a47ff" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <!-- plant -->
        <g transform="translate(50, 60)">
          <rect x="2" y="22" width="22" height="20" rx="4" fill="#a48bff"/>
          <path d="M13 22 C 4 14, 0 6, 8 0  C 12 6, 13 14, 13 22 Z" fill="#7ed598"/>
          <path d="M13 22 C 22 14, 24 6, 18 2 C 14 8, 13 14, 13 22 Z" fill="#5fb87f"/>
        </g>
      </svg>
    </div>

    <a href="index.html" class="home-btn">
      <i class="fas fa-home"></i>
      返回首页
    </a>
  </div>

  <!-- ─────────── FEATURE CARDS ─────────── -->
  <div class="features">
    <div class="feat">
      <div class="ic"><i class="fas fa-bell"></i></div>
      <div class="txt">对接信息显示在上班单元格</div>
    </div>
    <div class="feat">
      <div class="ic"><i class="fas fa-shuffle"></i></div>
      <div class="txt">按当天排班随机均分分配</div>
    </div>
    <div class="feat">
      <div class="ic"><i class="fas fa-user-group"></i></div>
      <div class="txt">每个上班人员必须对应一个休息人员（可重复）</div>
    </div>
    <div class="feat">
      <div class="ic"><i class="fas fa-eye-slash"></i></div>
      <div class="txt">无休息人员时显示"对接：无休息人员"</div>
    </div>
  </div>
  <div class="feat-note">
    <i class="fas fa-circle-info"></i>
    如遇特殊情况，将提前调整对接安排。
  </div>

  <!-- ─────────── DRAG + AUTO ─────────── -->
  <div class="two-col">
    <div class="panel">
      <div class="panel-title">
        <span class="pt-ic"><i class="fas fa-hand-paper"></i></span>
        拖拽下方标签到排班表中安排工作
      </div>
      <div class="drag-row">
        <div class="drag-tag work" draggable="true" data-type="work">
          <i class="fas fa-briefcase"></i> 上班
        </div>
        <div class="drag-tag rest" draggable="true" data-type="rest">
          <i class="fas fa-bed"></i> 休息
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span class="pt-ic"><i class="fas fa-wand-magic-sparkles"></i></span>
        智能随机排班
      </div>
      <div class="auto-row" id="daySelector">
        <label class="day-pill"><input type="checkbox" value="0" data-day="星期一"><span>星期一</span></label>
        <label class="day-pill"><input type="checkbox" value="1" data-day="星期二"><span>星期二</span></label>
        <label class="day-pill"><input type="checkbox" value="2" data-day="星期三"><span>星期三</span></label>
        <label class="day-pill"><input type="checkbox" value="3" data-day="星期四"><span>星期四</span></label>
        <label class="day-pill"><input type="checkbox" value="4" data-day="星期五"><span>星期五</span></label>
        <label class="day-pill selected"><input type="checkbox" value="5" data-day="星期六" checked><span>星期六</span></label>
        <label class="day-pill selected"><input type="checkbox" value="6" data-day="星期天" checked><span>星期天</span></label>
        <button class="gen-btn" id="genBtn" onclick="generateRandomSchedule()">
          <i class="fas fa-wand-magic-sparkles"></i>
          <span id="genBtnText">生成随机排班（1天）</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ─────────── GROUP + RULES ─────────── -->
  <div class="group-row">
    <div class="group">
      <div class="gh"><span class="gic"><i class="fas fa-users"></i></span>运营组</div>
      <div class="members">杨有淇、陈吉舒、王涛、王清月、袁丽妮、陈冉</div>
    </div>
    <div class="group">
      <div class="gh"><span class="gic"><i class="fas fa-book"></i></span>智能规则</div>
      <div class="rules">
        <b>星期天</b>：随机2人上班 <span class="sep">|</span> <b>2天排班</b>：每人工作1天休息1天<br>
        <b>互补原则</b>：星期天上班 → 另一天休息 <span class="sep">|</span> <b>其他</b>：随机安排
      </div>
    </div>
  </div>

  <!-- ─────────── TABLE ─────────── -->
  <div class="table-wrap">
    <table class="sched">
      <thead>
        <tr>
          <th>员工姓名</th>
          <th>星期一</th><th>星期二</th><th>星期三</th>
          <th>星期四</th><th>星期五</th><th>星期六</th><th>星期天</th>
        </tr>
      </thead>
      <tbody id="scheduleBody"></tbody>
    </table>
  </div>

  <!-- ─────────── BOTTOM ACTIONS ─────────── -->
  <div class="actions">
    <button class="act clear"  onclick="clearSchedule()"><i class="fas fa-trash-can"></i> 清空排班表</button>
    <button class="act export" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> 导出Excel</button>
    <button class="act save"   onclick="saveSchedule()"><i class="fas fa-floppy-disk"></i> 保存排班</button>
    <button class="act shot"   onclick="copyTableScreenshot()"><i class="fas fa-camera"></i> 复制表格截图</button>
  </div>

</div>

<!-- 右键菜单 -->
<div id="contextMenu" class="context-menu">
  <div class="context-menu-item work"   data-action="work"><i class="fas fa-briefcase"></i> 设为上班</div>
  <div class="context-menu-item rest"   data-action="rest"><i class="fas fa-bed"></i> 设为休息</div>
  <div class="context-menu-item delete" data-action="delete"><i class="fas fa-trash-can"></i> 清空</div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ───────── data ─────────
  const employees = ['杨有淇', '陈吉舒', '王涛', '王清月', '袁丽妮', '陈冉'];
  const dayNames = ['星期一','星期二','星期三','星期四','星期五','星期六','星期天'];

  function makeAvatar(name) {
    const img = document.createElement('img');
    img.className = 'avatar';
    img.alt = name;
    img.src = `头像/${encodeURIComponent(name)}.png`;
    return img;
  }

  // ───────── init table ─────────
  function initScheduleTable() {
    const tbody = document.getElementById('scheduleBody');
    employees.forEach((emp, i) => {
      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      const wrap = document.createElement('div');
      wrap.className = 'emp-cell';
      wrap.appendChild(makeAvatar(emp));
      const nm = document.createElement('span');
      nm.className = 'emp-name';
      nm.textContent = emp;
      wrap.appendChild(nm);
      nameTd.appendChild(wrap);
      tr.appendChild(nameTd);

      for (let d = 0; d < 7; d++) {
        const td = document.createElement('td');
        const cell = document.createElement('div');
        cell.className = 'schedule-cell';
        cell.textContent = '点击或拖拽安排';
        cell.addEventListener('dragover', handleDragOver);
        cell.addEventListener('drop', handleDrop);
        cell.addEventListener('dragleave', handleDragLeave);
        cell.addEventListener('dblclick', handleDoubleClick);
        cell.addEventListener('contextmenu', handleRightClick);
        td.appendChild(cell);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    });
  }

  // ───────── drag tags ─────────
  function initDragAndDrop() {
    document.querySelectorAll('.drag-tag').forEach(el => {
      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', el.dataset.type);
        el.style.opacity = '.6';
        setTimeout(() => el.style.opacity = '1', 80);
      });
    });
  }

  // ───────── day selector ─────────
  function initDaySelector() {
    document.querySelectorAll('.day-pill').forEach(label => {
      label.addEventListener('click', e => {
        // checkbox toggles natively; sync class after
        setTimeout(() => {
          const inp = label.querySelector('input');
          label.classList.toggle('selected', inp.checked);
          updateGenBtn();
        }, 0);
      });
    });
  }
  function updateGenBtn() {
    const sel = document.querySelectorAll('.day-pill input:checked');
    const btn = document.getElementById('genBtn');
    const txt = document.getElementById('genBtnText');
    if (sel.length === 0) {
      btn.disabled = true;
      txt.textContent = '请先选择排班天数';
    } else {
      btn.disabled = false;
      txt.textContent = `生成随机排班（${sel.length}天）`;
    }
  }

  // ───────── employee helpers ─────────
  function getEmployeeNameByCell(cell) {
    const row = cell ? cell.closest('tr') : null;
    const nameEl = row ? row.querySelector('.emp-name') : null;
    return nameEl ? nameEl.textContent.trim() : '';
  }
  function shuffleArray(list) {
    const a = [...list];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ───────── handover assign ─────────
  function updateHandoverAssignments() {
    const rows = document.querySelectorAll('#scheduleBody tr');
    for (let day = 0; day < 7; day++) {
      const works = [], rests = [];
      rows.forEach(row => {
        const td = row.children[day + 1];
        const sc = td && td.querySelector('.schedule-cell');
        if (!sc) return;
        const name = getEmployeeNameByCell(sc);
        if (sc.classList.contains('work-assigned')) works.push({cell:sc, name});
        else if (sc.classList.contains('rest-assigned')) rests.push(name);
      });
      if (!works.length) continue;
      if (!rests.length) {
        works.forEach(w => {
          const t = w.cell.querySelector('.handover-text');
          if (t) t.textContent = '对接：无休息人员';
        });
        continue;
      }
      const sR = shuffleArray(rests), sW = shuffleArray(works);
      const map = new Map();
      works.forEach(w => map.set(w.cell, []));
      if (sR.length >= sW.length) {
        sR.forEach((rn, i) => map.get(sW[i % sW.length].cell).push(rn));
      } else {
        sW.forEach((wo, i) => map.get(wo.cell).push(sR[i % sR.length]));
      }
      works.forEach(w => {
        const names = map.get(w.cell) || [];
        const t = w.cell.querySelector('.handover-text');
        if (!t) return;
        t.textContent = names.length ? `对接：${names.join('、')}` : '对接：无休息人员';
      });
    }
  }

  // ───────── set status ─────────
  function setScheduleStatus(cell, type) {
    cell.classList.remove('work-assigned', 'rest-assigned', 'assigned', 'handover-assigned');
    if (type === 'work') {
      cell.classList.add('work-assigned', 'assigned', 'handover-assigned');
      cell.innerHTML = '<div class="schedule-status"><i class="fas fa-briefcase"></i> 上班</div><div class="handover-text">对接：待分配</div>';
    } else if (type === 'rest') {
      cell.classList.add('rest-assigned', 'assigned');
      cell.innerHTML = '<div class="schedule-status"><i class="fas fa-bed"></i> 休息</div>';
    } else {
      cell.textContent = '点击或拖拽安排';
    }
    cell.style.transform = 'scale(1.06)';
    setTimeout(() => cell.style.transform = '', 180);
    updateHandoverAssignments();
  }

  // ───────── DnD ─────────
  function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
  function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function handleDrop(e) {
    e.preventDefault();
    const type = e.dataTransfer.getData('text/plain');
    e.currentTarget.classList.remove('drag-over');
    setScheduleStatus(e.currentTarget, type);
  }
  function handleDoubleClick(e) {
    const c = e.currentTarget;
    if (c.classList.contains('assigned')) setScheduleStatus(c, 'clear');
  }
  function handleRightClick(e) {
    e.preventDefault();
    const m = document.getElementById('contextMenu');
    m.style.left = e.pageX + 'px';
    m.style.top = e.pageY + 'px';
    m.style.display = 'block';
    m.currentCell = e.currentTarget;
    setTimeout(() => document.addEventListener('click', hideContextMenu), 10);
  }
  function hideContextMenu() {
    document.getElementById('contextMenu').style.display = 'none';
    document.removeEventListener('click', hideContextMenu);
  }
  function initContextMenu() {
    document.querySelectorAll('.context-menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const m = document.getElementById('contextMenu');
        const a = item.dataset.action;
        if (m.currentCell) setScheduleStatus(m.currentCell, a === 'delete' ? 'clear' : a);
        hideContextMenu();
      });
    });
  }

  // ───────── random schedule ─────────
  function generateRandomSchedule() {
    const sel = document.querySelectorAll('.day-pill input:checked');
    if (!sel.length) { toast('请先选择排班天数'); return; }
    const rows = document.querySelectorAll('#scheduleBody tr');
    const days = Array.from(sel).map(i => ({index: +i.value, name: i.dataset.day}));

    // clear selected days
    days.forEach(d => rows.forEach(r => {
      const c = r.children[d.index + 1];
      if (c) setScheduleStatus(c.querySelector('.schedule-cell'), 'clear');
    }));

    if (days.length === 2) generateTwoDay(days, rows);
    else generateRegular(days, rows);

    toast('排班生成成功 ✨');
  }

  function generateTwoDay(days, rows) {
    const sun = days.find(d => d.name === '星期天');
    const oth = days.find(d => d !== sun);
    if (!sun) { generateRegular(days, rows); return; }
    const shuffled = shuffleArray(employees);
    const w1 = shuffled[0], w2 = shuffled[1];
    const sunRest = employees.filter(e => e !== w1 && e !== w2);
    const othWork = sunRest;
    rows.forEach(r => {
      const name = r.querySelector('.emp-name').textContent;
      const sCell = r.children[sun.index + 1].querySelector('.schedule-cell');
      setScheduleStatus(sCell, (name === w1 || name === w2) ? 'work' : 'rest');
      const oCell = r.children[oth.index + 1].querySelector('.schedule-cell');
      setScheduleStatus(oCell, othWork.includes(name) ? 'work' : 'rest');
    });
  }

  function generateRegular(days, rows) {
    days.forEach(d => {
      let workCount;
      if (d.name === '星期天') workCount = 2;
      else workCount = Math.floor(employees.length / 2) + (Math.random() < .5 ? 0 : 1);
      const shuffled = shuffleArray(employees);
      const workers = shuffled.slice(0, workCount);
      rows.forEach(r => {
        const name = r.querySelector('.emp-name').textContent;
        const cell = r.children[d.index + 1].querySelector('.schedule-cell');
        setScheduleStatus(cell, workers.includes(name) ? 'work' : 'rest');
      });
    });
  }

  // ───────── action buttons ─────────
  function clearSchedule() {
    if (!confirm('确定清空整张排班表吗？')) return;
    document.querySelectorAll('.schedule-cell').forEach(c => setScheduleStatus(c, 'clear'));
    toast('已清空 ✓');
  }

  function exportToExcel() {
    const data = [['员工姓名', ...dayNames]];
    document.querySelectorAll('#scheduleBody tr').forEach(row => {
      const name = row.querySelector('.emp-name').textContent;
      const cells = Array.from(row.children).slice(1).map(td => {
        const sc = td.querySelector('.schedule-cell');
        if (sc.classList.contains('work-assigned')) {
          const ht = sc.querySelector('.handover-text');
          return ht ? `上班（${ht.textContent}）` : '上班';
        }
        if (sc.classList.contains('rest-assigned')) return '休息';
        return '';
      });
      data.push([name, ...cells]);
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '排班表');
    XLSX.writeFile(wb, `排班表_${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('已导出 Excel ✓');
  }

  function saveSchedule() {
    const data = [];
    document.querySelectorAll('#scheduleBody tr').forEach(row => {
      const name = row.querySelector('.emp-name').textContent;
      const arr = Array.from(row.children).slice(1).map(td => {
        const sc = td.querySelector('.schedule-cell');
        if (sc.classList.contains('work-assigned')) return 'work';
        if (sc.classList.contains('rest-assigned')) return 'rest';
        return '';
      });
      data.push({name, schedule: arr});
    });
    localStorage.setItem('schedule_v2', JSON.stringify(data));
    toast('已保存到本地 ✓');
  }

  function copyTableScreenshot() {
    const wrap = document.querySelector('.table-wrap');
    html2canvas(wrap, {backgroundColor: '#ffffff', scale: 2}).then(canvas => {
      canvas.toBlob(blob => {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
            .then(() => toast('截图已复制到剪贴板 ✓'))
            .catch(() => downloadBlob(blob));
        } else {
          downloadBlob(blob);
        }
      });
    });
  }
  function downloadBlob(blob) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '排班表截图.png';
    a.click();
    toast('已下载截图 ✓');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ───────── boot ─────────
  document.addEventListener('DOMContentLoaded', () => {
    initScheduleTable();
    initDragAndDrop();
    initDaySelector();
    initContextMenu();
    updateGenBtn();
  });
</script>
</body>
</html>
